</head>

<main class="settings-container">
  <!-- Header avec icône -->
  <div class="settings-header">
    <i class="bi bi-gear settings-icon"></i>
    <div>
      <h1>Settings</h1>
      <p>Manage your account and preferences</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="settings-tabs">
    <button class="tab active">Account</button>
    <button class="tab">Reading Goals</button>
    <button class="tab">Appearance</button>
  </div>

  <!-- Account Information -->
  <section class="account-info card" data-content="account">
    <h2>Account Information</h2>
    <form>
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" value="John">
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" value="Doe">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" value="john@example.com">
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" value="johndoe">
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" value="New York, NY">
      </div>

      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" rows="4">Passionate book lover and collector...</textarea>
      </div>

      <button type="submit" class="btn-save">Save Changes</button>
    </form>
  </section>
  <section class="password-info card" data-content="account">
    <h2>Change Password</h2>
    <form>
      <div class="form-group">
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" placeholder="Enter current password">
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password">
      </div>

      <button type="submit" class="btn-save">Update Password</button>
    </form>
  </section>
  <section class="appearance-section card hidden" data-content="appearance">
    <h2>Appearance</h2>

    <!-- Mode -->
    <div class="appearance-modes">
      <div class="mode-box active" data-mode="light">Light</div>
      <div class="mode-box" data-mode="dark">Dark</div>
      <div class="mode-box" data-mode="system">System</div>
    </div>

    <!-- Font size -->
    <div class="font-size">
      <label>Font Size</label>
      <input type="range" min="12" max="22" value="16" id="fontSizeSlider">
    </div>
  </section>
</main>
<script src="settings.js"></script>
</body>
</html>
