<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Reading Room - BookSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #6B8E23;
      --green-dark: #4f6b17;
      --cream: #FFF8E8;
      --text: #2c2c2c;
      --text-muted: #666;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── modal-overlay ── */
    .modal-overlay {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── modal ── */
    .modal {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 520px;
      padding: 34px 38px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
    }

    /* ── modal-header ── */
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .modal-header h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .modal-close {
      background: #f3f4f6;
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 15px;
      cursor: pointer;
      color: #888;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .modal-close:hover { background: #e5e7eb; color: var(--text); }

    /* ── modal-subtitle ── */
    .modal-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 26px;
      line-height: 1.6;
    }

    /* ── field ── */
    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 7px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: #fafafa;
      border: 1.5px solid #e5e7eb;
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: #ccc; }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--green);
      background: #fafff5;
    }

    .field select { appearance: none; cursor: pointer; }
    .field select option { background: white; color: var(--text); }
    .field textarea { resize: vertical; min-height: 78px; line-height: 1.6; }

    /* ── field-row ── */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── type-toggle ── */
    .type-toggle { display: flex; gap: 8px; }

    .type-opt {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: 2px solid #e5e7eb;
      background: white;
      color: #999;
      text-align: center;
      transition: all 0.18s;
    }

    .type-opt.selected {
      border-color: var(--green);
      color: var(--green);
      background: #f5fde8;
    }

    .type-opt:hover:not(.selected) { border-color: #ccc; color: var(--text); }

    /* ── tags-selector ── */
    .tags-selector { display: flex; flex-wrap: wrap; gap: 7px; }

    .tag-opt {
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      cursor: pointer;
      border: 1.5px solid #e5e7eb;
      background: white;
      color: #999;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: all 0.15s;
    }

    .tag-opt:hover { border-color: #aaa; color: var(--text); }

    .tag-opt.selected {
      border-color: var(--green);
      color: var(--green);
      background: #f5fde8;
    }

    /* ── modal-footer ── */
    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1.5px solid #f0f0f0;
    }

    .btn-cancel {
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      background: white;
      color: var(--text-muted);
      border: 1.5px solid #e5e7eb;
      transition: all 0.18s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-cancel:hover { border-color: #ccc; color: var(--text); background: #f9f9f9; }

    .btn-create {
      padding: 10px 26px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      background: var(--green);
      color: white;
      border: none;
      transition: all 0.2s;
    }

    .btn-create:hover {
      background: var(--green-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(107, 142, 35, 0.35);
    }

    @media (max-width: 540px) {
      .modal { padding: 24px 20px; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">

    <div class="modal-header">
      <h2>Create Reading Room</h2>
      <button class="modal-close" id="closeModalBtn">&#x2715;</button>
    </div>
    <p class="modal-subtitle">Create a new reading room to share your favorite books with others...</p>

    <div class="field">
      <label>Book title</label>
      <input type="text" id="bookTitle" placeholder="e.g. The Brothers Karamazov">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Author</label>
        <input type="text" id="bookAuthor" placeholder="e.g. Fyodor Dostoevsky">
      </div>
      <div class="field">
        <label>Total pages</label>
        <input type="number" id="totalPages" placeholder="e.g. 520" min="1">
      </div>
    </div>

    <div class="field">
      <label>Room type</label>
      <div class="type-toggle">
        <button class="type-opt selected">Live Session</button>
        <button class="type-opt">Scheduled</button>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Max participants</label>
        <input type="number" id="maxPart" placeholder="e.g. 15" min="2" max="50">
      </div>
      <div class="field">
        <label>Genre</label>
        <select id="genre">
          <option value="" disabled selected>Select genre</option>
          <option>Classic</option><option>Sci-Fi</option><option>Fantasy</option>
          <option>Dystopian</option><option>Romance</option><option>Philosophy</option>
          <option>Drama</option><option>Adventure</option><option>Fiction</option><option>Non-Fiction</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Tags</label>
      <div class="tags-selector">
        <button class="tag-opt">Classic</button>
        <button class="tag-opt">Sci-Fi</button>
        <button class="tag-opt">Fantasy</button>
        <button class="tag-opt">Romance</button>
        <button class="tag-opt">Dystopian</button>
        <button class="tag-opt">Philosophy</button>
        <button class="tag-opt">Adventure</button>
        <button class="tag-opt">Drama</button>
        <button class="tag-opt">Fiction</button>
      </div>
    </div>

    <div class="field">
      <label>Description (optional)</label>
      <textarea id="description" placeholder="What will you discuss in this reading room?"></textarea>
    </div>

    <div class="modal-footer">
      <a href="reading-rooms.html" class="btn-cancel">Cancel</a>
      <button class="btn-create" id="createBtn">Create Room</button>
    </div>

  </div>
</div>

<script>
  document.querySelectorAll('.type-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.type-opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
    });
  });

  document.querySelectorAll('.tag-opt').forEach(tag => {
    tag.addEventListener('click', () => tag.classList.toggle('selected'));
  });

  document.getElementById('createBtn').addEventListener('click', () => {
    const title = document.getElementById('bookTitle');
    if (!title.value.trim()) {
      title.style.borderColor = '#ef4444';
      title.focus();
      return;
    }
    document.getElementById('createBtn').textContent = '✓ Room Created!';
    document.getElementById('createBtn').style.background = '#22c55e';
    setTimeout(() => { window.location.href = 'reading-rooms.html'; }, 1000);
  });

  document.getElementById('bookTitle').addEventListener('input', function() {
    this.style.borderColor = '';
  });
</script>

</body>
</html>
